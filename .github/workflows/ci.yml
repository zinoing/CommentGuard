name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm run lint
      - run: pnpm run typecheck

  test-node-services:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: commentguard
          POSTGRES_PASSWORD: commentguard_test
          POSTGRES_DB: commentguard_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://commentguard:commentguard_test@localhost:5432/commentguard_test
      JWT_SECRET: test-secret-do-not-use-in-production
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm run db:generate
      - run: pnpm run db:migrate
      - name: Run tests with coverage gate
        run: pnpm run test -- --coverage --coverageThreshold='{"global":{"lines":80}}'

  test-python-classifier:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r services/risk-classifier/requirements.txt
      - run: pip install pytest pytest-cov
      - run: pytest services/risk-classifier --cov=app --cov-fail-under=80

  docker-build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - service: bff-api
            dockerfile: services/bff-api/Dockerfile
            context: .
          - service: collector-service
            dockerfile: services/collector-service/Dockerfile
            context: .
          - service: evidence-service
            dockerfile: services/evidence-service/Dockerfile
            context: .
          - service: action-service
            dockerfile: services/action-service/Dockerfile
            context: .
          - service: risk-classifier
            dockerfile: services/risk-classifier/Dockerfile
            context: services/risk-classifier
    steps:
      - uses: actions/checkout@v4
      - name: Build ${{ matrix.service }}
        run: docker build -f ${{ matrix.dockerfile }} ${{ matrix.context }} -t commentguard/${{ matrix.service }}:test
