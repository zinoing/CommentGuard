version: "3.9"

# Phase 1 (MVP) stack — local only
# Phase 3+: Redis, Kafka, Elasticsearch are NOT included here

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: commentguard
      POSTGRES_PASSWORD: commentguard_dev
      POSTGRES_DB: commentguard
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U commentguard"]
      interval: 5s
      timeout: 5s
      retries: 5

  localstack:
    image: localstack/localstack:3.0
    ports:
      - "4566:4566"
    environment:
      - SERVICES=s3,kms
      - DEFAULT_REGION=ap-northeast-2
      - LOCALSTACK_VOLUME_DIR=/var/lib/localstack
    volumes:
      - localstack_data:/var/lib/localstack

  risk-classifier:
    build:
      context: services/risk-classifier
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY}

  collector-service:
    build:
      context: .
      dockerfile: services/collector-service/Dockerfile
    ports:
      - "3002:3002"
    environment:
      DATABASE_URL: postgresql://commentguard:commentguard_dev@postgres:5432/commentguard
      YOUTUBE_API_KEY: ${YOUTUBE_API_KEY}
      S3_EVIDENCE_BUCKET: commentguard-evidence
      AWS_ENDPOINT_URL: http://localstack:4566
      AWS_REGION: ap-northeast-2
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      CLASSIFIER_URL: http://risk-classifier:8001
    depends_on:
      postgres:
        condition: service_healthy
      localstack:
        condition: service_started
      risk-classifier:
        condition: service_started

  evidence-service:
    build:
      context: .
      dockerfile: services/evidence-service/Dockerfile
    ports:
      - "3003:3003"
    environment:
      DATABASE_URL: postgresql://commentguard:commentguard_dev@postgres:5432/commentguard
      S3_EVIDENCE_BUCKET: commentguard-evidence
      AWS_ENDPOINT_URL: http://localstack:4566
      AWS_REGION: ap-northeast-2
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
    depends_on:
      postgres:
        condition: service_healthy
      localstack:
        condition: service_started

  action-service:
    build:
      context: .
      dockerfile: services/action-service/Dockerfile
    ports:
      - "3004:3004"
    environment:
      DATABASE_URL: postgresql://commentguard:commentguard_dev@postgres:5432/commentguard
    depends_on:
      postgres:
        condition: service_healthy

  bff-api:
    build:
      context: .
      dockerfile: services/bff-api/Dockerfile
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgresql://commentguard:commentguard_dev@postgres:5432/commentguard
      JWT_SECRET: ${JWT_SECRET}
      ALLOWED_ORIGINS: http://localhost:3000
      AWS_ENDPOINT_URL: http://localstack:4566
      AWS_REGION: ap-northeast-2
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
    depends_on:
      postgres:
        condition: service_healthy
      localstack:
        condition: service_started

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_BFF_URL: http://localhost:3001
    depends_on:
      - bff-api

volumes:
  postgres_data:
  localstack_data:
