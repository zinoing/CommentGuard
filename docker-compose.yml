version: "3.9"

# Phase 1 (MVP) stack — local only
# Phase 3+: Redis, Kafka, Elasticsearch are NOT included here

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: commentguard
      POSTGRES_PASSWORD: commentguard_dev
      POSTGRES_DB: commentguard
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U commentguard"]
      interval: 5s
      timeout: 5s
      retries: 5

  risk-classifier:
    build:
      context: services/risk-classifier
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      DATABASE_URL: postgresql://commentguard:commentguard_dev@postgres:5432/commentguard
    depends_on:
      postgres:
        condition: service_healthy

  collector-service:
    build:
      context: .
      dockerfile: services/collector-service/Dockerfile
    ports:
      - "3002:3002"
    environment:
      DATABASE_URL: postgresql://commentguard:commentguard_dev@postgres:5432/commentguard
      YOUTUBE_API_KEY: ${YOUTUBE_API_KEY}
      R2_BUCKET_NAME: ${R2_BUCKET_NAME}
      R2_ENDPOINT_URL: ${R2_ENDPOINT_URL}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY}
      CLASSIFIER_URL: http://risk-classifier:8001
    depends_on:
      postgres:
        condition: service_healthy
      risk-classifier:
        condition: service_started

  evidence-service:
    build:
      context: .
      dockerfile: services/evidence-service/Dockerfile
    ports:
      - "3003:3003"
    environment:
      DATABASE_URL: postgresql://commentguard:commentguard_dev@postgres:5432/commentguard
      R2_BUCKET_NAME: ${R2_BUCKET_NAME}
      R2_ENDPOINT_URL: ${R2_ENDPOINT_URL}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY}
    depends_on:
      postgres:
        condition: service_healthy

  action-service:
    build:
      context: .
      dockerfile: services/action-service/Dockerfile
    ports:
      - "3004:3004"
    environment:
      DATABASE_URL: postgresql://commentguard:commentguard_dev@postgres:5432/commentguard
    depends_on:
      postgres:
        condition: service_healthy

  bff-api:
    build:
      context: .
      dockerfile: services/bff-api/Dockerfile
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgresql://commentguard:commentguard_dev@postgres:5432/commentguard
      JWT_SECRET: ${JWT_SECRET}
      ALLOWED_ORIGINS: http://localhost:3000
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_BFF_URL: http://localhost:3001
    depends_on:
      - bff-api

volumes:
  postgres_data:
