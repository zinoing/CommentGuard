version: "3.9"

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: commentguard
      POSTGRES_PASSWORD: commentguard_dev
      POSTGRES_DB: commentguard
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U commentguard"]
      interval: 5s
      timeout: 5s
      retries: 5

  bff-api:
    build:
      context: .
      dockerfile: services/bff-api/Dockerfile
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: development
      PORT: 3001
      DATABASE_URL: postgresql://commentguard:commentguard_dev@postgres:5432/commentguard
      JWT_SECRET: ${JWT_SECRET}
      CLASSIFIER_URL: http://risk-classifier:8001
      BFF_CALLBACK_URL: http://bff-api:3001/internal/collect/video-done
      ALLOWED_ORIGINS: http://localhost:3000
      INTERNAL_SECRET: ${INTERNAL_SECRET}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    volumes:
      - ./services/bff-api/src:/app/services/bff-api/src
      - ./packages:/app/packages
      - /app/packages/db/node_modules
      - /app/packages/shared/node_modules
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  risk-classifier:
    build:
      context: services/risk-classifier
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    environment:
      DATABASE_URL: postgresql://commentguard:commentguard_dev@postgres:5432/commentguard
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      YOUTUBE_API_KEY: ${YOUTUBE_API_KEY}
      BFF_CALLBACK_URL: http://bff-api:3001/internal/collect/video-done
      INTERNAL_SECRET: ${INTERNAL_SECRET}
      DEV_MAX_VIDEOS: ${DEV_MAX_VIDEOS:-0}
      DEV_MAX_COMMENTS: ${DEV_MAX_COMMENTS:-100}
    volumes:
      - ./services/risk-classifier/app:/app/app
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      BFF_URL: http://bff-api:3001
      NEXT_PUBLIC_BFF_URL: http://localhost:3001
      INTERNAL_SECRET: ${INTERNAL_SECRET}
      WATCHPACK_POLLING: "true"
    volumes:
      - ./apps/web:/app/apps/web
      - ./packages:/app/packages
      - /app/packages/db/node_modules
      - /app/packages/shared/node_modules
      - /app/apps/web/node_modules
      - /app/apps/web/.next
    depends_on:
      - bff-api

volumes:
  postgres_data:
